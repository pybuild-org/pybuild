name: 'setup pybuild'
description: 'install pybuild cli'

inputs:
    version:
        description: 'version'
        required: false
        default: 'latest'

    goos:
        description: 'os'
        required: false
        default: 'linux'

    goarch:
        description: 'arch'
        required: false
        default: 'amd64'

runs:
    using: 'composite'
    steps:
        - name: 'url'
          id: url
          shell: bash
          run: |
              base="https://github.com/pybuild-org/pybuild/releases"

              ext=""
              if [ "${{ inputs.goos }}" = "windows" ]; then
                ext=".exe"
              fi

              file="pybuild-${{ inputs.goos }}-${{ inputs.goarch }}${ext}"

              if [ "${{ inputs.version }}" = "latest" ]; then
                echo "link=${base}/latest/download/${file}" >> $GITHUB_OUTPUT
              else
                echo "link=${base}/download/${inputs.version}/${file}" >> $GITHUB_OUTPUT
              fi

              echo "ext=${ext}" >> $GITHUB_OUTPUT

        - name: 'install'
          shell: bash
          run: |
              mkdir -p "$HOME/.local/bin"
              target="$HOME/.local/bin/pybuild${{ steps.url.outputs.ext }}"

              curl -sSL "${{ steps.url.outputs.link }}" -o "$target"
              chmod +x "$target"
              echo "$HOME/.local/bin" >> $GITHUB_PATH
