name: build pybuild

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@main
              with:
                  sparse-checkout-cone-mode: false
                  sparse-checkout: |
                      .github

            - name: setup go
              uses: actions/setup-go@main
              with:
                  go-version: '1.26.4'

            - name: save dist list
              run: go tool dist list -json > .github/platforms.json

            - name: run build
              run: go run .github/scripts/build.go
