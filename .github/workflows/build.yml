name: build pybuild

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@main
              with:
                  sparse-checkout-cone-mode: false
                  sparse-checkout: |
                      .github

            - name: setup go
              uses: actions/setup-go@main
              with:
                  go-version: '1.26.4'

            - name: make build dir
              run: mkdir -p .github/build

            - name: save build targets
              run: go tool dist list -json > .github/build/targets.json

            - name: make dist dir
              run: mkdir -p .github/build/dist

            - name: run build
              run: go run .github/scripts/build.go
